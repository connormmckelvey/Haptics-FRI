; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:seeed_xiao_esp32c3]
platform = espressif32
board = seeed_xiao_esp32c3
framework = arduino

lib_deps =
    electroniccats/MPU6050 @ ^1.3.1
; ; If PlatformIO ever guesses wrong, pin ports explicitly.
; upload_port = COM6
; monitor_port = COM6

; Serial Monitor Speed
monitor_speed = 115200

; ; Some serial monitors toggle DTR/RTS on connect; on ESP boards this can
; ; accidentally force the chip back into the ROM downloader.
; monitor_dtr = 0
; monitor_rts = 0


; ; IMPORTANT (why you saw "no prints"):
; ; The `seeed_xiao_esp32c3` board definition enables USB-CDC on boot by default
; ; (ARDUINO_USB_MODE=1, ARDUINO_USB_CDC_ON_BOOT=1). That makes `Serial` print to
; ; the native USB-CDC port, not the CH343 UART on COM6.
; ;
; ; Since your PC currently sees a CH343 adapter on COM6, force `Serial` back to
; ; UART0 by unsetting those default defines.
; build_unflags =
; 	-D ARDUINO_USB_MODE=1
; 	-D ARDUINO_USB_CDC_ON_BOOT=1

; ; (Optional but explicit) keep them disabled.
; build_flags =
; 	-D ARDUINO_USB_MODE=0
; 	-D ARDUINO_USB_CDC_ON_BOOT=0

; NOTE:
; - If you're using the XIAO's native USB-C port and want the sketch to print
;   over USB-CDC, uncomment the build_flags below.
; - If you're using a USB-to-UART adapter (e.g., CH343/CH340/CP2102), leave
;   these commented so `Serial` uses UART0.
;build_flags =
;    -D ARDUINO_USB_MODE=1
;    -D ARDUINO_USB_CDC_ON_BOOT=1

; ; Optional: If you have trouble uploading, try forcing the flash mode
; board_build.flash_mode = dio
